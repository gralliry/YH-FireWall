name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Build frontend
        run: npm run build
        working-directory: ui

      - name: Setup Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version: "1.26"

      - name: Build yfwd
        run: go build -o build/yfwd ./cmd/yfwd

      - name: Build yfw
        run: go build -o build/yfw ./cmd/yfw

      - name: Package release
        run: |
          RELEASE_NAME="yfw-linux-amd64"
          mkdir -p "$RELEASE_NAME"
          cp build/yfwd "$RELEASE_NAME/"
          cp build/yfw "$RELEASE_NAME/"
          cp install.sh "$RELEASE_NAME/"
          tar czf "build/$RELEASE_NAME.tar.gz" "$RELEASE_NAME"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: yfw-binaries
          path: build/

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload v1.2.0 build/yfw-linux-*.tar.gz --clobber
