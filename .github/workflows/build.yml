name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Build frontend
        run: npm run build
        working-directory: ui

      - name: Setup Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version: "1.26"

      - name: Build binaries
        run: |
          mkdir -p build
          for arch in amd64 arm64 arm; do
            echo "Building linux/$arch..."
            GOARCH=$arch go build -o "build/yfwd-linux-$arch" ./cmd/yfwd
            GOARCH=$arch go build -o "build/yfw-linux-$arch" ./cmd/yfw
          done

      - name: Package releases
        run: |
          cd build
          for arch in amd64 arm64 arm; do
            echo "Packaging yfw-linux-$arch..."
            mkdir -p "yfw-linux-$arch"
            cp "yfwd-linux-$arch" "yfw-linux-$arch/yfwd"
            cp "yfw-linux-$arch" "yfw-linux-$arch/yfw"
            cp ../install.sh "yfw-linux-$arch/"
            tar czf "yfw-linux-$arch.tar.gz" "yfw-linux-$arch"
          done

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: yfw-binaries
          path: build/

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload v1.2.0 build/yfw-linux-*.tar.gz --clobber
