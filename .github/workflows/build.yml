name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - {goos: linux, goarch: "386"}
          - {goos: linux, goarch: amd64}
          - {goos: linux, goarch: arm}
          - {goos: linux, goarch: arm64}
          - {goos: linux, goarch: loong64}
          - {goos: linux, goarch: mips}
          - {goos: linux, goarch: mips64}
          - {goos: linux, goarch: mips64le}
          - {goos: linux, goarch: mipsle}
          - {goos: linux, goarch: ppc64}
          - {goos: linux, goarch: ppc64le}
          - {goos: linux, goarch: riscv64}
          - {goos: linux, goarch: s390x}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Resolve version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_ENV"
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.arch.goos }}
          GOARCH: ${{ matrix.arch.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -o dist/yfw-core-$GOOS-$GOARCH   ./cmd/core
          go build -o dist/yfw-client-$GOOS-$GOARCH ./cmd/client
          sha256sum dist/yfw-core-$GOOS-$GOARCH   > dist/yfw-core-$GOOS-$GOARCH.sha256
          sha256sum dist/yfw-client-$GOOS-$GOARCH > dist/yfw-client-$GOOS-$GOARCH.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yfw-${{ matrix.arch.goos }}-${{ matrix.arch.goarch }}
          path: dist/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
