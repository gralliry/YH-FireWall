name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Build frontend
        run: npm run build
        working-directory: ui

      - name: Setup Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version: "1.26"

      - name: Build yfwd
        run: go build -o build/yfwd ./cmd/yfwd

      - name: Build yfw
        run: go build -o build/yfw ./cmd/yfw

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: yfw-binaries
          path: build/
